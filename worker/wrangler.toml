name = "ukiyo-e-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"

routes = [
  { pattern = "api-ukiyo.weweekly.online/*", zone_name = "weweekly.online" }
]

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "1f3380fd6d704fe5a12e73e37d159c4a"

[durable_objects]
bindings = [
  { name = "GENERATION_QUEUE", class_name = "GenerationQueue" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GenerationQueue"]

# Secrets (set via `wrangler secret put`):
# - DASHSCOPE_API_KEY
